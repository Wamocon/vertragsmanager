  <text font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#1A1A1A">
    <textPath href="#sealTopText" startOffset="50%" text-anchor="middle">ENTWICKELT IN</textPath>
  </text>

  <path id="sealBottomText" d="M 38,118 A 72,72 0 0,0 182,118" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#1A1A1A">
