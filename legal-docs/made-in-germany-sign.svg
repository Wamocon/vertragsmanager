  </text>

  <rect x="80" y="92" width="60" height="8" rx="1" fill="#000000"/>
  <rect x="80" y="100" width="60" height="8" fill="#DD0000"/>
  <rect x="80" y="108" width="60" height="8" rx="1" fill="#FFCC00"/>
