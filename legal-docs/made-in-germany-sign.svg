<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Entwickelt in Deutschland Sign</title>
  <desc id="desc">Round seal with star and German flag stripes.</desc>
  <circle cx="110" cy="110" r="96" stroke="#1A1A1A" stroke-width="4"/>
  <circle cx="110" cy="110" r="86" stroke="#1A1A1A" stroke-width="2"/>

