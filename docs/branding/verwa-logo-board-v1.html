<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VerWa - Logo Vorschlaege</title>
  <style>
    :root { --ink:#0f172a; --muted:#64748b; --card:#fff; --line:#cbd5e1; }
    * { box-sizing:border-box; }
    body {
      margin:0; padding:28px; font-family:"Segoe UI", Arial, sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#e2e8f0 100%); color:var(--ink);
    }
    h1 { margin:0 0 8px; font-size:34px; }
    p { margin:0 0 18px; color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px; }
    .meta { display:flex; justify-content:space-between; margin-bottom:8px; font-size:13px; color:var(--muted); }
    img { width:100%; height:auto; border-radius:10px; border:1px solid #e2e8f0; background:#fff; }
  </style>
</head>
<body>
  <h1>VerWa - Die Vertragswaechterin</h1>
  <p>10 App-Logo Vorschlaege fuer Vergleich und Auswahl.</p>
  <section class="grid">
    <article class="card"><div class="meta"><strong>L1</strong><span>Schild + Check</span></div><img src="logos/verwa/verwa-l1-shield-check.svg" alt="L1"/></article>
    <article class="card"><div class="meta"><strong>L2</strong><span>Auge + Dokument</span></div><img src="logos/verwa/verwa-l2-eye-doc.svg" alt="L2"/></article>
    <article class="card"><div class="meta"><strong>L3</strong><span>Glocke + Alarm</span></div><img src="logos/verwa/verwa-l3-bell-alert.svg" alt="L3"/></article>
    <article class="card"><div class="meta"><strong>L4</strong><span>Monogramm VW</span></div><img src="logos/verwa/verwa-l4-monogram-vw.svg" alt="L4"/></article>
    <article class="card"><div class="meta"><strong>L5</strong><span>Kompass</span></div><img src="logos/verwa/verwa-l5-compass-guard.svg" alt="L5"/></article>
    <article class="card"><div class="meta"><strong>L6</strong><span>Siegel Premium</span></div><img src="logos/verwa/verwa-l6-seal-premium.svg" alt="L6"/></article>
    <article class="card"><div class="meta"><strong>L7</strong><span>Schloss + Paragraph</span></div><img src="logos/verwa/verwa-l7-lock-paragraph.svg" alt="L7"/></article>
    <article class="card"><div class="meta"><strong>L8</strong><span>Radar Watch</span></div><img src="logos/verwa/verwa-l8-radar-watch.svg" alt="L8"/></article>
    <article class="card"><div class="meta"><strong>L9</strong><span>Dokument + Schild</span></div><img src="logos/verwa/verwa-l9-doc-shield.svg" alt="L9"/></article>
    <article class="card"><div class="meta"><strong>L10</strong><span>Minimal V</span></div><img src="logos/verwa/verwa-l10-minimal-v.svg" alt="L10"/></article>
  </section>
</body>
</html>
