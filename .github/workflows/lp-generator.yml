name: "🚀 Generate Landing Page"

# workflow_dispatch allows manual triggering via the "Actions" tab
on:
  workflow_dispatch:
    inputs:
      custom_template:
        description: "Which design template should be used?"
        default: "Wamocon/hochzeitsrechner_lp" # CHANGE: Set your default template here (e.g. a repo with a standard landing page design)
        required: true
      custom_name:
        description: "What should the new Landing Page repository be named?"
        default: "generated_lp" # CHANGE: Define your standard naming scheme (e.g. "productname_lp") or leave it to the user to decide at runtime.
        required: true
      custom_prompt:
        description: "Instructions for the AI (Prompt)"
        # CHANGE: Your detailed standard prompt for developers to generate the landing page. Make it as specific as possible to get the best results from Copilot. You can also choose to leave a more generic prompt and have users customize it at runtime.
        default: "Analyze files in the parent directory (../). Create a bilingual landing page (EN/DE). Include buttons for App, Imprint, T&C, and Privacy Policy."
        required: true

jobs:
  run-automation:
    # IMPORTANT: Path to the central workflow. Format: OrgName/RepoName/.github/...@Branch
    uses: Wamocon/github_workflow/.github/workflows/lp-generator.yml@main
    with:
      template_repo: ${{ github.event.inputs.custom_template }}
      new_repo_name: ${{ github.event.inputs.custom_name }}
      ai_prompt: ${{ github.event.inputs.custom_prompt }}
    secrets:
      # These secrets must be created once at the Organization level (Wamocon)
      ORG_PAT: ${{ secrets.ORG_PAT }}
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}